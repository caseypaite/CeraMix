name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write # required for creating releases and uploading assets

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  PNPM_VERSION: "9"
  # Node.js 20 GitHub Actions are deprecated from June 16 2026 — opt in to Node 24 explicitly.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1 — Bundle the Python inference backend into a standalone binary.
  #          Runs for Windows, Linux, and macOS (desktop only — mobile cannot
  #          run arbitrary sidecar processes).
  # ──────────────────────────────────────────────────────────────────────────
  build-sidecar:
    name: Sidecar / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            triple: x86_64-pc-windows-msvc
            exe_suffix: ".exe"
            pyinstaller_output: python/dist/ceramix-engine.exe
          - os: ubuntu-22.04
            triple: x86_64-unknown-linux-gnu
            exe_suffix: ""
            pyinstaller_output: python/dist/ceramix-engine
          - os: macos-latest
            triple: aarch64-apple-darwin
            exe_suffix: ""
            pyinstaller_output: python/dist/ceramix-engine

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.os }}-${{ hashFiles('python/requirements.txt') }}
          restore-keys: pip-${{ matrix.os }}-

      - name: Install Python dependencies + PyInstaller
        working-directory: python
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build sidecar (PyInstaller --onefile)
        working-directory: python
        run: pyinstaller ceramix_engine.spec --distpath dist --workpath build --noconfirm

      # Rename to match Tauri v2's sidecar convention:
      #   binaries/ceramix-engine-{triple}[.exe]
      - name: Rename to Tauri sidecar convention
        shell: bash
        run: |
          src="${{ matrix.pyinstaller_output }}"
          dst="python/dist/ceramix-engine-${{ matrix.triple }}${{ matrix.exe_suffix }}"
          mv "$src" "$dst"
          echo "Sidecar: $dst"
          ls -lh "python/dist/"

      - uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.os }}
          path: python/dist/ceramix-engine-${{ matrix.triple }}${{ matrix.exe_suffix }}
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2 — Build the Tauri desktop app (Windows, Linux, macOS).
  #          Downloads the matching sidecar artifact, places it in
  #          src-tauri/binaries/, then runs `pnpm tauri build`.
  # ──────────────────────────────────────────────────────────────────────────
  build-tauri:
    name: Tauri / ${{ matrix.os }}
    needs: build-sidecar
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            triple: x86_64-pc-windows-msvc
            exe_suffix: ".exe"
            tauri_args: "--target x86_64-pc-windows-msvc --bundles nsis"
            artifact_glob: "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe"

          - os: ubuntu-22.04
            triple: x86_64-unknown-linux-gnu
            exe_suffix: ""
            tauri_args: "--target x86_64-unknown-linux-gnu --bundles appimage"
            artifact_glob: "src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage"

          - os: macos-latest
            triple: aarch64-apple-darwin
            exe_suffix: ""
            tauri_args: "--target aarch64-apple-darwin --bundles dmg"
            artifact_glob: "src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ── Place sidecar ──────────────────────────────────────────────────────
      - uses: actions/download-artifact@v4
        with:
          name: sidecar-${{ matrix.os }}
          path: sidecar-staging

      - name: Place sidecar in src-tauri/binaries/
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          sidecar="ceramix-engine-${{ matrix.triple }}${{ matrix.exe_suffix }}"
          cp "sidecar-staging/$sidecar" "src-tauri/binaries/$sidecar"
          echo "Placed: src-tauri/binaries/$sidecar"

      # ── Linux: system packages required by WebKitGTK / Tauri ──────────────
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libglib2.0-dev

      # ── Rust ──────────────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.triple }}

      # ── Node + pnpm ───────────────────────────────────────────────────────
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: pnpm install --no-frozen-lockfile

      # ── macOS: create-dmg is required by Tauri's bundle_dmg.sh ──────────────
      - name: Install create-dmg (macOS only)
        if: matrix.os == 'macos-latest'
        run: brew install create-dmg

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build Tauri app
        run: pnpm tauri build ${{ matrix.tauri_args }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: List bundle output
        shell: bash
        run: ls -lh $(dirname "${{ matrix.artifact_glob }}") || true

      - uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3 — Build iOS IPA.
  #          Requires Apple signing secrets for a distributable IPA.
  #          Set BUILD_CERTIFICATE_BASE64, P12_PASSWORD, KEYCHAIN_PASSWORD,
  #          and BUILD_PROVISION_PROFILE_BASE64 in Settings → Secrets.
  #          Without secrets the job is marked continue-on-error and skipped
  #          from the release assets.
  # ──────────────────────────────────────────────────────────────────────────
  build-ios:
    name: iOS
    runs-on: macos-latest
    # iOS always attempts to build; signing steps are skipped when Apple secrets
    # are absent. The build will fail without a development team cert, but
    # continue-on-error prevents that from blocking the release.
    continue-on-error: true
    env:
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: pnpm install --no-frozen-lockfile

      # ── Rust with iOS target ───────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: aarch64-apple-ios

      # ── Apple code-signing (optional) ─────────────────────────────────────
      # Import the .p12 certificate into a temporary keychain so xcodebuild
      # can sign the archive. Skip these two steps if secrets are absent.
      - name: Install Apple signing certificate
        if: env.BUILD_CERTIFICATE_BASE64 != ''
        env:
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT=$RUNNER_TEMP/cert.p12
          KEYCHAIN=$RUNNER_TEMP/app.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN"

      - name: Install provisioning profile
        if: env.BUILD_PROVISION_PROFILE_BASE64 != ''
        run: |
          PP=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP" ~/Library/MobileDevice/Provisioning\ Profiles/

      # ── Build ─────────────────────────────────────────────────────────────
      # tauri-build validates externalBin paths at compile time for iOS too.
      - name: Create placeholder sidecar for iOS (externalBin compile-time check)
        run: mkdir -p src-tauri/binaries && touch src-tauri/binaries/ceramix-engine-aarch64-apple-ios

      - name: Initialize iOS project
        run: pnpm tauri ios init

      - name: Build iOS
        run: pnpm tauri ios build
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: src-tauri/gen/apple/build/**/*.ipa
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 4 — Build Android APK (unsigned).
  #          Produces a universal unsigned release APK that users can
  #          sideload. Add ANDROID_KEYSTORE_BASE64, ANDROID_KEY_ALIAS,
  #          ANDROID_KEY_PASSWORD, and ANDROID_STORE_PASSWORD secrets to
  #          enable a signed APK for Play Store submission.
  # ──────────────────────────────────────────────────────────────────────────
  build-android:
    name: Android
    runs-on: ubuntu-22.04
    # Android builds are best-effort — signing and mobile entry-point issues
    # should not block the desktop release.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: pnpm install --no-frozen-lockfile

      # ── Java (Android build toolchain) ────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── Android NDK ───────────────────────────────────────────────────────
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
          add-to-path: true

      # ── Rust with Android targets ──────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: android

      # ── Build ─────────────────────────────────────────────────────────────
      # ANDROID_SDK_ROOT is a shell env var on ubuntu runners but NOT in the
      # GitHub Actions `env` context — export it explicitly for subsequent steps.
      - name: Export ANDROID_HOME
        run: echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      # tauri-build validates externalBin paths at compile time for every target
      # triple, including Android. The Python sidecar can't run on Android, but
      # we still need placeholder files so the build doesn't error out.
      - name: Create placeholder sidecars for Android (externalBin compile-time check)
        run: |
          mkdir -p src-tauri/binaries
          for triple in aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android; do
            touch "src-tauri/binaries/ceramix-engine-${triple}"
          done

      - name: Initialize Android project
        run: pnpm tauri android init
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Build Android APK (unsigned)
        run: pnpm tauri android build --apk
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 5 — Create a GitHub Release and attach all platform binaries.
  #          Requires desktop builds; iOS is optional (continue-on-error).
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [build-tauri, build-ios, build-android]
    # Desktop builds must succeed. iOS and Android are best-effort.
    if: always() && needs.build-tauri.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Derive release tag from package.json version (e.g. 0.0.1 → v0.0.1).
      - name: Resolve release tag
        id: tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "name=v${VERSION}" >> "$GITHUB_OUTPUT"

      # Desktop artifacts (always present)
      - uses: actions/download-artifact@v4
        with:
          pattern: tauri-*
          path: release-assets
          merge-multiple: true

      # Android APK — optional, skipped if build-android failed
      - uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release-assets
        continue-on-error: true

      # iOS IPA — optional, skipped silently if the job failed or produced no IPA
      - uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: release-assets
        continue-on-error: true

      - name: List release assets
        run: ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: "CeraMix ${{ steps.tag.outputs.name }}"
          draft: false
          # Tags containing a hyphen (e.g. v0.1.0-beta) are marked pre-release.
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
